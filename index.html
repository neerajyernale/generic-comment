<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comments Manager</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row"></div>
    <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white text-center">
        <h4 class="mb-0">Manage Comments</h4>
          </div>
          <div class="card-body">
            <form id="commentForm">
              <div class="form-group">
                <label for="name">Name*</label>
                <input type="text" class="form-control" id="name" placeholder="Enter name">
              </div>
              <div class="form-group">
                <label for="email">Email*</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email">
              </div>
              <div class="form-group">
                <label for="body">Comment*</label>
                <textarea class="form-control" id="body" rows="3" placeholder="Enter comment"></textarea>
              </div>
              <div class="d-flex">
                <button class="btn btn-primary flex-fill mr-2" id="addBtn">Add Comment</button>
                <button class="btn btn-warning flex-fill d-none" id="updateBtn" type="button">Update Comment</button>
              </div>
              </form>
            </div>
           </div>
      </div>
      <div class="col-md-12 mt-4">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white text-center">
            <h4 class="mb-0">All Comments</h4>
          </div>
          <div class="card-body">
            <div class="row" id="cContainer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="spinner d-none" id="spinner">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <script src="assets/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
